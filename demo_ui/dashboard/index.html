<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Self Improving Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; }
    .grid { display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .tile { border: 1px solid #d0d7de; border-radius: 10px; padding: 0.9rem; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>
  <p>Main flow target after login.</p>
  <div class="grid">
    <div class="tile">Active Users: 27</div>
    <div class="tile">Open Alerts: 3</div>
    <div class="tile">Health Score: 92</div>
  </div>
  <p><a href="/">Back Home</a></p>
</body>
</html>
